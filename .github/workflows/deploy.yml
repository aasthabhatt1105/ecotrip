name: EcoTrip CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Run backend tests
        run: |
          cd backend/api
          pip install -r requirements-dev.txt
          pytest --cov=app tests/
          
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Run mobile tests
        run: |
          cd mobile-app
          npm ci
          npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: Build and push images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/ecotrip-api:${{ github.sha }} -f Dockerfile .
          docker build -t $ECR_REGISTRY/ecotrip-websocket:latest -f Dockerfile.websocket ./backend/websocket
          docker push $ECR_REGISTRY/ecotrip-api:${{ github.sha }}
          docker push $ECR_REGISTRY/ecotrip-websocket:latest
          
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name ecotrip-cluster
          kubectl set image deployment/ecotrip-api api=$ECR_REGISTRY/ecotrip-api:${{ github.sha }}
          kubectl rollout status deployment/ecotrip-api

  deploy-mobile:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Build mobile app
        run: |
          cd mobile-app
          eas build --platform all --non-interactive
